<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bank Account Connected — JobsU</title>
  <meta name="description" content="Your bank account is connected. You're ready to receive payments on JobsU." />
  <link rel="icon" type="image/png" href="JobsU-favicon-nobackground.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0B1B3A;
      --blue: #1F4B99;
      --ice:  #F5F8FF;
      --border: #E6ECFF;
      --muted: #5B6B88;
      --green: #22C55E;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--ice);
      color: var(--navy);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      align-items: center;
      padding: 0 40px;
      height: 64px;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(11,27,58,0.08);
    }

    .nav-logo-img { height: 48px; display: block; }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 56px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(11,27,58,0.08);
    }

    .success-ring {
      width: 88px;
      height: 88px;
      background: #F0FDF4;
      border: 3px solid var(--green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    @keyframes pop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .check-svg {
      width: 40px;
      height: 40px;
      stroke: var(--green);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: draw 0.5s 0.3s ease forwards;
    }

    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    h1 {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: var(--navy);
      margin-bottom: 12px;
    }

    p {
      font-size: 16px;
      font-weight: 600;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .return-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 16px 24px;
      background: var(--blue);
      color: white;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 16px;
      font-weight: 900;
      border-radius: 14px;
      text-decoration: none;
      transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 16px rgba(31,75,153,0.3);
    }

    .return-btn:hover {
      background: #2D5FBF;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(31,75,153,0.35);
    }

    .return-btn:active { transform: none; }

    .return-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .hint {
      margin-top: 16px;
      font-size: 13px;
      font-weight: 600;
      color: #8A9AB8;
    }

    footer {
      background: var(--navy);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-copy { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.4); }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.5); text-decoration: none; }
    .footer-links a:hover { color: white; }

    @media (max-width: 520px) {
      nav { padding: 0 20px; }
      .card { padding: 40px 24px; border-radius: 20px; }
      h1 { font-size: 22px; }
      footer { padding: 20px; flex-direction: column; text-align: center; }
      .footer-links { justify-content: center; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html">
      <img src="JobsU-logo-nobackground.png" alt="JobsU" class="nav-logo-img" />
    </a>
  </nav>

  <main>
    <div class="card">

      <div class="success-ring">
        <svg class="check-svg" viewBox="0 0 40 40">
          <polyline points="8,21 16,30 32,12" />
        </svg>
      </div>

      <h1>Your bank account is connected!</h1>
      <p>You're all set to receive payments. Head back to the app to start getting paid.</p>

      <a href="jobsu://profile" class="return-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
        Return to JobsU App
      </a>

      <p class="hint">Tapping the button will open the JobsU app automatically.</p>

    </div>
  </main>

  <footer>
    <img src="JobsU-logo.png" alt="JobsU" style="height:28px;background:white;border-radius:6px;padding:2px 6px;" />
    <p class="footer-copy">&copy; 2025 JobsU. All rights reserved.</p>
    <div class="footer-links">
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Terms</a>
      <a href="mailto:support@jobsu.app">Support</a>
    </div>
  </footer>

</body>
</html>
